<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Cálculo de Média</title>
    </head>
    <body>
        <h1>Cálculo de Média usando "if"</h1>
        <form action="calcular_media.php" method="post">
            <div>
                <label for="nome">Nome do Aluno:</label>
                <input type="text" name="nome" id="nome">
            </div>
            <div>
                <label for="nota1">Nota 1:</label>
                <input type="number" name="nota1" id="nota1" step="any">
            </div>
            <div>
                <label for="nota2">Nota 2:</label>
                <input type="number" name="nota2" id="nota2" step="any">
            </div>
            <button>Calcular Média</button>
        </form>
    </body>
</html>
