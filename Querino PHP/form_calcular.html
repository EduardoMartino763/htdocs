<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Calculadora de 2 números</title>
    </head>
    <body>
        <h1>Calculadora PHP</h1>
        <form action="calcular.php" method="post">
            <input type="number" placeholder="Número 1" name="numero1" id="numero1" step="any">
            <select name="operacao" id="operacao">
                <option value="+">Adição</option>
                <option value="-">Subtração</option>
                <option value="*">Multiplicação</option>
                <option value="/">Divisão</option>
            </select>
            <input type="number" placeholder="Número 2" name="numero2" id="numero2" step="any">
            <button>calcular</button>
        </form>
    </body>
</html>
