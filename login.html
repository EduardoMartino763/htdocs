<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>LOGIN</title>
    </head>
    <body>
        <h1>Digite seu email e senha!</h1>
        <form action="tela_login.php" method="post">
            <div>
                <label for="email">E-mail:</label>
                <input type="email" name="email" id="email">
            </div>

                <label for="senha">Senha:</label>

            <div>
                <button>Enter</button>
            </div>
        </form>
    </body>
</html>
